{% extends "base.html" %}

{% block title %}Logout | Personal Library{% endblock %}

{% block content %}
    <section class="auth-page">
        <form class="auth-card auth-card-slim" action="/api/users/session/logout" method="post">
            <div class="auth-card-header auth-card-header-tight"><h1>Logout</h1></div>
            <button class="btn btn-dark submit-button auth-submit" type="submit">Logout</button>
            <a class="btn btn-outline-dark submit-button auth-secondary" href="/">Cancel</a>
        </form>
    </section>
{% endblock %}
