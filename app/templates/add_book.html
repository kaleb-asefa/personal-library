{% extends "base.html" %}

{% block title %}Add Book | Personal Library{% endblock %}

{% block content %}
    <section class="form-layout form-layout-wide">
        <div class="form-intro">
            <h1>Add book</h1>
            <p class="page-lede">Log a book in your shelf.</p>
        </div>

        <form class="action-form" data-api-form="add-book" hx-boost="false">
            <input type="hidden" name="user_id" value="{{ current_user.user_id }}">

            <label class="field-group">
                <span>Title</span>
                <input class="form-control" name="title" type="text" maxlength="255" required>
            </label>

            <label class="field-group">
                <span>Author</span>
                <input class="form-control" name="author_name" type="text" maxlength="255" required>
            </label>

            <label class="field-group">
                <span>Published year</span>
                <input class="form-control" name="published_year" type="number" min="0" max="3000" required>
            </label>

            <fieldset class="field-group genre-picker">
                <legend>Genres</legend>
                <div class="checkbox-grid">
                    {% for genre in genres %}
                        <label>
                            <input type="checkbox" name="genre_ids" value="{{ genre.genre_id }}">
                            <span>{{ genre.name }}</span>
                        </label>
                    {% endfor %}
                </div>
            </fieldset>

            <button class="btn btn-dark submit-button" type="submit">Add</button>
        </form>
    </section>
{% endblock %}
