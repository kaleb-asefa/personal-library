<a class="book-tile" href="/books/{{ book.book_id }}" aria-label="Open {{ book.title }}">
    <div class="book-cover cover-{{ (book.book_id % 5) + 1 }}">
        <h2 class="book-title">{{ book.title }}</h2>
    </div>

    <div class="book-meta">
        <div class="meta-row">
            <span>{{ book.author.name }}</span>
        </div>

        {% if book.published_year %}
            <div class="meta-row">
                <span>{{ book.published_year }}</span>
            </div>
        {% endif %}

        {% if book.genres %}
            <div class="genre-list" aria-label="Genres">
                {% for genre in book.genres %}
                    <span class="genre-pill">{{ genre.name }}</span>
                {% endfor %}
            </div>
        {% endif %}

        <div class="tile-footer">
            <span class="status-badge status-{{ book.status }}">{{ book.status }}</span>
        </div>
    </div>
</a>
