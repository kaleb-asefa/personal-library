<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Library{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/library.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="app-nav">
        <a class="brand-mark" href="/">
            <i class="bi bi-bookshelf"></i>
            <span>Personal Library</span>
        </a>

        <div class="nav-actions">
            <a class="nav-link-pill" href="/">
                <i class="bi bi-grid"></i>
                <span>Books</span>
            </a>
            <a class="nav-link-pill" href="/users">
                <i class="bi bi-people"></i>
                <span>Users</span>
            </a>
            <a class="nav-link-pill" href="/books/new">
                <i class="bi bi-plus-square"></i>
                <span>Add Book</span>
            </a>
            <a class="nav-link-pill nav-link-strong" href="/users/new">
                <i class="bi bi-person-plus"></i>
                <span>New User</span>
            </a>
        </div>
    </nav>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/js/forms.js') }}"></script>
</body>
</html>
