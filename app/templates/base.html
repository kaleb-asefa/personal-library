<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Personal Library{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/library.css') }}" rel="stylesheet">
    {% block head_extra %}{% endblock %}
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body
    hx-boost="true"
    hx-target="#page-content"
    hx-select="#page-content"
    hx-swap="outerHTML show:window:top"
    hx-push-url="true"
    hx-indicator="#route-loader"
>
    {% set active_path = request.url.path %}
    <div id="route-loader" class="route-loader htmx-indicator"></div>

    <nav class="app-nav">
        <a class="brand-mark" href="/">
            <i class="bi bi-bookshelf"></i>
            <span>Reading Shelf</span>
        </a>

        <div class="nav-actions">
            <a data-nav-link class="nav-link-pill {{ 'is-active' if active_path == '/' or (active_path.startswith('/books/') and active_path != '/books/new') else '' }}" href="/" {% if active_path == '/' or (active_path.startswith('/books/') and active_path != '/books/new') %}aria-current="page"{% endif %}>
                <i class="bi bi-house-door"></i>
                <span>Home</span>
            </a>
            <a data-nav-link class="nav-link-pill {{ 'is-active' if active_path.startswith('/users') and active_path != '/users/new' else '' }}" href="/users" {% if active_path.startswith('/users') and active_path != '/users/new' %}aria-current="page"{% endif %}>
                <i class="bi bi-people"></i>
                <span>Readers</span>
            </a>
            <a data-nav-link class="nav-link-pill {{ 'is-active' if active_path == '/books/new' else '' }}" href="/books/new" {% if active_path == '/books/new' %}aria-current="page"{% endif %}>
                <i class="bi bi-plus-square"></i>
                <span>Add Book</span>
            </a>
            <a data-nav-link class="nav-link-pill nav-link-strong {{ 'is-active' if active_path == '/users/new' else '' }}" href="/users/new" {% if active_path == '/users/new' %}aria-current="page"{% endif %}>
                <i class="bi bi-person-plus"></i>
                <span>New User</span>
            </a>
        </div>

        <div class="auth-panel" data-auth-panel>
            <a class="auth-guest-link" data-auth-guest-link href="/login">
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Login</span>
            </a>

            <div class="auth-user-chip" data-auth-user-chip hidden>
                <div class="auth-avatar" data-auth-avatar>RS</div>
                <div class="auth-user-copy">
                    <strong data-auth-name>Guest</strong>
                    <span data-auth-email></span>
                </div>
                <button class="auth-logout-button" type="button" data-auth-logout>
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main id="page-content" class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/js/forms.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
