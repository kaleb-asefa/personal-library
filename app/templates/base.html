<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Stacks{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/style.css') }}" rel="stylesheet">
</head>
<body>
    {% set active_path = request.url.path %}
    {% set logged_in = request.session.get('user_id') %}

    <nav class="topbar">
        <a class="brand" href="/">
            <i class="bi bi-bookshelf"></i>
            <span class="brand-name">The Stacks</span>
        </a>

        {% if logged_in %}
        <div class="nav-links">
            <a href="/" class="{{ 'active' if active_path == '/' else '' }}">Shelf</a>
            <a href="/books/new" class="{{ 'active' if active_path == '/books/new' else '' }}">Add</a>
            <a href="/users/me" class="{{ 'active' if active_path.startswith('/users') else '' }}">Profile</a>
        </div>
        {% endif %}

        <div class="nav-spacer"></div>

        {% if logged_in %}
        <div class="user-chip">
            <span class="avatar">{{ request.session.get('username', '?')[:1] | upper }}</span>
            <form action="/auth/logout" method="post" class="logout-form">
                <button type="submit" class="btn-link">Log out</button>
            </form>
        </div>
        {% else %}
        <a href="/login" class="nav-login">Log in</a>
        {% endif %}
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
