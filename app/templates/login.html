{% extends "base.html" %}

{% block title %}Login | Personal Library{% endblock %}

{% block content %}
    <section class="auth-page">
        <form class="auth-card auth-card-slim" action="/api/users/session/login" method="post">
            <div class="auth-card-header auth-card-header-tight"><h1>Login</h1></div>
            <label class="field-group">
                <span>Email</span>
                <input class="form-control" type="email" name="email" autocomplete="email" required>
            </label>
            <label class="field-group">
                <span>Password</span>
                <input class="form-control" type="password" name="password" autocomplete="current-password" required>
            </label>
            <button class="btn btn-dark submit-button auth-submit" type="submit">Login</button>
            <a class="auth-subtle-link" href="/users/new">Sign Up</a>
        </form>
    </section>
{% endblock %}
