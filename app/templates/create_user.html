{% extends "base.html" %}

{% block title %}Sign Up | Personal Library{% endblock %}

{% block content %}
    <section class="form-layout">
        <div class="form-intro">
            <h1>Sign up</h1>
        </div>

        <form class="action-form" action="/api/users/signup" method="post">
            <label class="field-group">
                <span>Username</span>
                <input class="form-control" name="username" type="text" maxlength="255" required>
            </label>

            <label class="field-group">
                <span>Email</span>
                <input class="form-control" name="email" type="email" maxlength="255" required>
            </label>

            <label class="field-group">
                <span>Password</span>
                <input class="form-control" name="password" type="password" autocomplete="new-password">
            </label>

            <button class="btn btn-dark submit-button" type="submit">Sign Up</button>
        </form>
    </section>
{% endblock %}
